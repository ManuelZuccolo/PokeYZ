<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HP Bars</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #333;
        }
        
        .container {
            background-color: #222;
            padding: 30px;
            border-radius: 10px;
            width: 600px;
        }
        
        .hp-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .hp-box {
            flex: 1;
        }
        
        .hp-bar {
            height: 30px;
            background-color: #444;
            border-radius: 5px;
            overflow: hidden;
        }
        
        .hp-fill {
            height: 100%;
            width: 100%;
            background-color: #00ff00;
            transition: width 0.3s;
        }
        
        .hp-label {
            color: white;
            text-align: center;
            margin-top: 5px;
            font-size: 14px;
        }
        
        .buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
        }
        
        button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hp-row">
            <div class="hp-box">
                <div class="hp-bar">
                    <div class="hp-fill" id="hpLeft" style="width: 100%;"></div>
                </div>
                <p class="hp-label" id="hpLeftText">134/134</p>
            </div>

            <div class="hp-box">
                <div class="hp-bar">
                    <div class="hp-fill" id="hpRight" style="width: 100%;"></div>
                </div>
                <div class="hp-label" id="hpRightText">182/182</div>
            </div>
        </div>
        <p id = "banana">banana</p>
        
        <div class="buttons">
            <button onclick="turni('dirreto','fuoco','s',90,100,'burn30')">lanciafiamme</button>
            <button onclick="aggiornaBarraHP()">2</button>
            <button onclick="">3</button>
            <button onclick="">4</button>
        </div>
    </div>

    <script src="calcolodanno.js"></script>
</body>
</html>
